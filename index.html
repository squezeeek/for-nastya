<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для моєї Настюші ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffc0cb;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
        }

        /* Анімовані сердечка на фоні */
        .heart-bg {
            position: absolute;
            top: -10%;
            color: rgba(255, 105, 180, 0.6);
            font-size: 20px;
            user-select: none;
            animation: fall linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* ЕКРАН ПАРОЛЯ */
        #passwordOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffc0cb;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .password-box {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            border: 2px solid #ff69b4;
            width: 80%;
            max-width: 400px;
        }

        .password-box h2 { color: #d11d53; font-size: 1.3rem; margin-bottom: 20px; }
        
        .password-box input {
            width: 80%;
            padding: 10px;
            border-radius: 15px;
            border: 2px solid #ffc0cb;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 15px;
            outline: none;
        }

        /* ГОЛОВНИЙ КОНТЕНТ (спочатку прихований) */
        #mainContent {
            display: none;
            width: 100%;
            height: 100%;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .main-container {
            text-align: center;
            background: rgba(255, 255, 255, 0.9);
            padding: 30px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            z-index: 10;
            border: 2px solid #ff69b4;
            max-width: 85%;
        }

        /* ТАЙМЕР */
        .timer-box {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px dashed #ff1493;
        }
        
        .timer-label { font-size: 1rem; color: #ff1493; margin-bottom: 5px; }
        
        #timer {
            font-size: 1.1rem;
            font-weight: bold;
            color: #d11d53;
        }

        h1 { color: #d11d53; font-size: 2.2rem; margin: 10px 0; }
        p { color: #ff1493; font-size: 1.2rem; font-weight: 500; margin-bottom: 20px; }

        /* КУТОВА ТАБЛИЧКА */
        .corner-card {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 15px 20px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
            border: 2px solid #ff1493;
            z-index: 20;
            text-align: center;
        }

        .options { display: none; justify-content: center; gap: 10px; margin-top: 15px; }

        .btn {
            background-color: #ff69b4;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4);
            transition: transform 0.2s;
        }

        .btn:active { transform: scale(0.9); }

        #noBtn { position: relative; z-index: 100; transition: left 0.2s, top 0.2s; }

        .hidden-message { display: none; margin-top: 20px; font-weight: bold; color: #d11d53; font-size: 1.4rem; animation: fadeIn 1s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="passwordOverlay">
        <div class="password-box">
            <h2>як ти мене називаєш найчастіше?</h2>
            <input type="text" id="passInput" placeholder="Твоя відповідь...">
            <br>
            <button class="btn" onclick="checkPassword()">Увійти ❤️</button>
        </div>
    </div>

    <div id="mainContent">
        <div class="main-container">
            <div class="timer-box">
                <div class="timer-label">Ми разом уже:</div>
                <div id="timer">Завантаження...</div>
            </div>

            <h1>Кохаю Настюшу! ❤️</h1>
            <p>Ти наяскравіше сонечко у моєму житті)</p>
            
            <button class="btn" onclick="showMainMessage()">Натисни тут</button>
            <div id="mainMessage" class="hidden-message">Ти неймовірна! ✨🌹</div>
        </div>

        <div class="corner-card" id="cornerCard">
            <h3 id="cornerTitle" onclick="showLoveOptions()" style="cursor:pointer; color:#d11d53; margin:0; font-size:1.1rem;">а ти мене кохаєш?)</h3>
            <div id="optionsBlock" class="options">
                <button id="yesBtn" class="btn" style="padding:8px 15px; font-size:0.9rem;" onclick="yesClick()">так</button>
                <button id="noBtn" class="btn" style="padding:8px 15px; font-size:0.9rem;">ні</button>
            </div>
            <div id="finalLoveMessage" style="display:none; color:#d11d53; font-weight:bold; margin-top:10px;">Я так і знав! ❤️🥰</div>
        </div>
    </div>

    <script>
        // --- 1. ПАРОЛЬ ---
        function checkPassword() {
            const val = document.getElementById('passInput').value.toLowerCase().trim();
            if(val === 'котя') {
                document.getElementById('passwordOverlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('passwordOverlay').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'flex';
                }, 500);
            } else {
                alert('Спробуй ще раз, сонечко! ❤️');
            }
        }

        // --- 2. ТАЙМЕР (з 20 вересня 2025) ---
        const startDate = new Date('2025-09-20T00:00:00');

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const mins = Math.floor((diff / 1000 / 60) % 60);
            const secs = Math.floor((diff / 1000) % 60);

            document.getElementById('timer').innerHTML = 
                `${days}д : ${hours}г : ${mins}хв : ${secs}с`;
        }
        setInterval(updateTimer, 1000);

        // --- 3. СЕРДЕЧКА ---
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart-bg');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 2 + 's';
            heart.style.fontSize = Math.random() * 15 + 15 + 'px';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }
        setInterval(createHeart, 300);

        // --- 4. ІНТЕРАКТИВ ---
        function showMainMessage() {
            document.getElementById('mainMessage').style.display = 'block';
            for(let i=0; i<20; i++) setTimeout(createHeart, i * 50);
        }

        function showLoveOptions() {
            document.getElementById('optionsBlock').style.display = 'flex';
            document.getElementById('cornerTitle').style.display = 'none';
        }

        const noBtn = document.getElementById('noBtn');
        function moveButton(e) {
            if(e) e.preventDefault();
            noBtn.style.position = 'fixed';
            const maxX = window.innerWidth - noBtn.offsetWidth - 20;
            const maxY = window.innerHeight - noBtn.offsetHeight - 20;
            noBtn.style.left = Math.random() * maxX + 'px';
            noBtn.style.top = Math.random() * maxY + 'px';
        }
        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('touchstart', moveButton);

        function yesClick() {
            noBtn.style.display = 'none';
            document.getElementById('yesBtn').style.display = 'none';
            document.getElementById('finalLoveMessage').style.display = 'block';
            for(let i=0; i<30; i++) setTimeout(createHeart, i * 40);
        }
    </script>
</body>
</html>
